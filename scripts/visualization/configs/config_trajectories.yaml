defaults:
  - world_model@datasets.tworoom.world_model: wsp
  - _self_ # Overrides from this file apply LAST

# Global Settings (Must be consistent across datasets for TSNE dimensions to match)
device: cuda
seed: 42
image_size: 224
patch_size: 14
frameskip: 5
cache_dir: null
dimensionality_reduction: pca

# Define the dataset-model pair to visualize. The world model is selected via
# the `defaults` list above; the checkpoint name is set in the selected
# world_model config.
datasets:
  tworoom:
    dataset:
      # Local TwoRoom dataset under the repo cache.
      dataset_name: ${hydra:runtime.cwd}/.stablewm/datasets/tworoom.h5
      batch_size: 32
      num_workers: 8
      n_trajectories: 4
      n_steps: ${eval:'${..world_model.num_preds} + ${..world_model.history_size}'}
    dataset_group: tworoom

defaults:
  - launcher: local
  - solver: cem
  # - solver: adam
  - objective: goal_mse
  - _self_

world:
  env_name: swm/TwoRoom-v1
  num_envs: ${eval.num_eval}
  max_episode_steps: ??? # make sure it's >= eval_budget
seed: 42
# policy: gcbc # ckpt name or random
# policy: lewm/weights_epoch_25.pt # ckpt name or random
# policy: wsp_ORIG/weights_epoch_50.pt # ckpt name or random
policy: wsp/weights_epoch_25.pt # ckpt name or random
# policy: runs/20260717/121346/b37e50670da6/checkpoints/epoch=3-step=164432.ckpt
# policy: .stablewm/runs/20260717/121346/b37e50670da6/checkpoints/last.pt

plan_config:
  horizon: 5
  receding_horizon: 5
  action_block: 5 # frameskip

dataset:
  stats: ${eval.dataset_name}
  keys_to_cache:
    - action
    - proprio

# evaluation from dataset (replay expert trajectories)
eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 50
  img_size: 224
  dataset_name: tworoom.h5
  callables:
    # -- set state
    - method: _set_state
      args:
        state:
          value: pos_agent
    # -- set goal state
    - method: _set_goal_state
      args:
        goal_state:
          value: goal_pos_agent

output:
  filename: tworoom_results.txt
